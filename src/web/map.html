<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BANDPASS II Map</title>
<link rel="stylesheet" href="leaflet/leaflet.css">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
  }
  #map {
    width: 100%; height: 100%;
  }
  #legend {
    position: absolute;
    bottom: 30px;
    right: 10px;
    z-index: 1000;
    background: rgba(255,255,255,0.92);
    padding: 8px 10px;
    border-radius: 4px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.35);
    font-family: sans-serif;
    font-size: 11px;
    display: none;
    min-width: 130px;
  }
  #legend-title { font-weight: bold; margin-bottom: 5px; }
  #legend-bar {
    width: 110px; height: 14px;
    background: linear-gradient(to right, #0000ff, #00ff80 33%, #ffff00 67%, #ff0000);
    border-radius: 2px;
    margin-bottom: 3px;
  }
  #legend-labels { display: flex; justify-content: space-between; }
</style>
</head>
<body>
<div id="map"></div>
<div id="legend">
  <div id="legend-title"></div>
  <div id="legend-bar"></div>
  <div id="legend-labels">
    <span id="legend-min"></span>
    <span id="legend-max"></span>
  </div>
</div>
<script src="leaflet/leaflet.js"></script>
<script src="bridge.js"></script>
<script>
(function () {
  'use strict';

  var tilePort = 0;
  try {
    var params = new URLSearchParams(window.location.search);
    tilePort = parseInt(params.get('port') || '0', 10);
  } catch (e) {}

  var tileUrl = tilePort > 0
    ? 'http://127.0.0.1:' + tilePort + '/{z}/{x}/{y}.png'
    : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';

  var map = L.map('map', { center: [54.0, -2.0], zoom: 6 });
  L.tileLayer(tileUrl, { attribution: '© OpenStreetMap contributors', maxZoom: 18 }).addTo(map);

  var transmitters   = {};
  var receiverMarker = null;
  var layerGroups    = {};
  var placementMode  = false;
  var receiverMode   = false;

  // ── Custom icons ──────────────────────────────────────────────────────────

  // Broadcast tower: red, anchor at base of tower (bottom-centre).
  // Crosshair at (12, 30) — centre of the base platform.
  // ViewBox extended to height 36 so the lower crosshair arm has room.
  var txIcon = L.divIcon({
    className: '',
    html: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36" width="24" height="36">'
        + '<circle cx="12" cy="2" r="2.5" fill="#cc2200"/>'
        + '<line x1="12" y1="0" x2="12" y2="8" stroke="#cc2200" stroke-width="2.5" stroke-linecap="round"/>'
        + '<path d="M8 5 A5 6 0 0 1 16 5" fill="none" stroke="#cc2200" stroke-width="1.5" opacity="0.8"/>'
        + '<path d="M5 7 A8 9 0 0 1 19 7" fill="none" stroke="#cc2200" stroke-width="1.1" opacity="0.5"/>'
        + '<path d="M12 8 L4 30 L20 30 Z" fill="none" stroke="#cc2200" stroke-width="2" stroke-linejoin="round"/>'
        + '<line x1="8"   y1="18" x2="16"   y2="18" stroke="#cc2200" stroke-width="1.5"/>'
        + '<line x1="6.5" y1="24" x2="17.5" y2="24" stroke="#cc2200" stroke-width="1.5"/>'
        + '<line x1="2"   y1="30" x2="22"   y2="30" stroke="#cc2200" stroke-width="2.5" stroke-linecap="round"/>'
        + '<line x1="8"  y1="30" x2="16" y2="30" stroke="#000" stroke-width="2.8" opacity="0.5"/>'
        + '<line x1="12" y1="26" x2="12" y2="34" stroke="#000" stroke-width="2.8" opacity="0.5"/>'
        + '<line x1="8"  y1="30" x2="16" y2="30" stroke="#fff" stroke-width="1.3"/>'
        + '<line x1="12" y1="26" x2="12" y2="34" stroke="#fff" stroke-width="1.3"/>'
        + '</svg>',
    iconSize:    [24, 36],
    iconAnchor:  [12, 30],
    popupAnchor: [0, -30]
  });

  // Vehicle/car: blue, anchor at bottom-centre between the wheels (y=22).
  // Crosshair at (18, 22) — fits neatly in the gap between the two wheel arcs.
  // ViewBox extended to height 26 so the lower crosshair arm has room.
  var rxIcon = L.divIcon({
    className: '',
    html: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 26" width="36" height="26">'
        + '<rect x="1"  y="9"  width="34" height="9"  rx="3" fill="#1a5fb4"/>'
        + '<path d="M9 9 L11 3 L25 3 L27 9 Z" fill="#2970c8"/>'
        + '<rect x="12" y="4" width="5" height="4" rx="1" fill="#c8e0fa" opacity="0.9"/>'
        + '<rect x="19" y="4" width="5" height="4" rx="1" fill="#c8e0fa" opacity="0.9"/>'
        + '<rect x="30" y="10" width="4" height="3" rx="1" fill="#f8d820" opacity="0.95"/>'
        + '<rect x="2"  y="10" width="4" height="3" rx="1" fill="#f02828" opacity="0.85"/>'
        + '<circle cx="10" cy="18" r="4"   fill="#222"/>'
        + '<circle cx="10" cy="18" r="2"   fill="#888"/>'
        + '<circle cx="26" cy="18" r="4"   fill="#222"/>'
        + '<circle cx="26" cy="18" r="2"   fill="#888"/>'
        + '<line x1="14" y1="22" x2="22" y2="22" stroke="#000" stroke-width="2.8" opacity="0.5"/>'
        + '<line x1="18" y1="18" x2="18" y2="26" stroke="#000" stroke-width="2.8" opacity="0.5"/>'
        + '<line x1="14" y1="22" x2="22" y2="22" stroke="#fff" stroke-width="1.3"/>'
        + '<line x1="18" y1="18" x2="18" y2="26" stroke="#fff" stroke-width="1.3"/>'
        + '</svg>',
    iconSize:    [36, 26],
    iconAnchor:  [18, 22],
    popupAnchor: [0, -22]
  });

  // ── C++ → JS ──────────────────────────────────────────────────────────────

  window.addTransmitter = function (id, lat, lon, name, locked) {
    if (transmitters[id]) { transmitters[id].marker.setLatLng([lat, lon]); return; }
    var marker = L.marker([lat, lon], { title: name, icon: txIcon, draggable: !locked });
    marker.on('dragend', function (e) {
      var ll = e.target.getLatLng();
      bandpassPostMessage({ type: 'transmitter_moved', id: id, lat: ll.lat, lon: ll.lng });
    });
    marker.on('click', function (e) {
      L.DomEvent.stopPropagation(e);
      bandpassPostMessage({ type: 'transmitter_selected', id: id });
    });
    marker.addTo(map);
    transmitters[id] = { marker: marker, name: name };
  };

  window.moveTransmitter = function (id, lat, lon) {
    if (transmitters[id]) transmitters[id].marker.setLatLng([lat, lon]);
  };

  window.removeTransmitter = function (id) {
    if (transmitters[id]) { transmitters[id].marker.remove(); delete transmitters[id]; }
  };

  window.lockTransmitter = function (id, locked) {
    if (!transmitters[id]) return;
    var m = transmitters[id].marker;
    if (locked) m.dragging.disable(); else m.dragging.enable();
  };

  window.setReceiver = function (lat, lon, locked) {
    if (receiverMarker) {
      receiverMarker.setLatLng([lat, lon]);
    } else {
      receiverMarker = L.marker([lat, lon], { title: 'Receiver', icon: rxIcon, draggable: !locked });
      receiverMarker.on('dragend', function (e) {
        var ll = e.target.getLatLng();
        bandpassPostMessage({ type: 'receiver_moved', lat: ll.lat, lon: ll.lng });
      });
      receiverMarker.addTo(map);
    }
  };

  window.removeReceiver = function () {
    if (receiverMarker) { receiverMarker.remove(); receiverMarker = null; }
  };

  window.lockReceiver = function (locked) {
    if (!receiverMarker) return;
    if (locked) receiverMarker.dragging.disable(); else receiverMarker.dragging.enable();
  };

  window.updateLayer = function (layerName, geojson) {
    if (layerGroups[layerName]) map.removeLayer(layerGroups[layerName]);
    var data = typeof geojson === 'string' ? JSON.parse(geojson) : geojson;
    var layer = L.geoJSON(data, {
      style: function (feature) {
        return { fillColor: (feature.properties && feature.properties.c) ? feature.properties.c : '#4444ff',
                 fillOpacity: 0.4, weight: 0, stroke: false };
      }
    }).addTo(map);
    layerGroups[layerName] = layer;
  };

  window.clearLayer = function (layerName) {
    if (layerGroups[layerName]) { map.removeLayer(layerGroups[layerName]); delete layerGroups[layerName]; }
  };

  window.setPlacementMode = function (enabled) {
    placementMode = enabled;
    if (enabled) receiverMode = false;
    map._container.style.cursor = (placementMode || receiverMode) ? 'crosshair' : '';
  };

  window.setReceiverPlacementMode = function (enabled) {
    receiverMode = enabled;
    if (enabled) placementMode = false;
    map._container.style.cursor = (placementMode || receiverMode) ? 'crosshair' : '';
  };

  // ── Legend ────────────────────────────────────────────────────────────────

  window.updateLegend = function (name, vmin, vmax, units) {
    var fmt = function (v) {
      return (Math.abs(v) >= 1000 || (Math.abs(v) < 0.01 && v !== 0))
        ? v.toExponential(1) : v.toFixed(1);
    };
    document.getElementById('legend-title').textContent =
      name + (units ? '  (' + units + ')' : '');
    document.getElementById('legend-min').textContent  = fmt(vmin);
    document.getElementById('legend-max').textContent  = fmt(vmax);
    document.getElementById('legend').style.display = 'block';
  };

  window.clearLegend = function () {
    document.getElementById('legend').style.display = 'none';
  };

  // ── JS → C++ ──────────────────────────────────────────────────────────────

  // Suppress browser context menu so back/forward/reload can't break the page
  document.addEventListener('contextmenu', function (e) { e.preventDefault(); });

  map.on('click', function (e) {
    if (receiverMode) {
      bandpassPostMessage({ type: 'receiver_placed', lat: e.latlng.lat, lon: e.latlng.lng });
      return;
    }
    if (placementMode) {
      bandpassPostMessage({ type: 'transmitter_placed', lat: e.latlng.lat, lon: e.latlng.lng });
    }
  });

  map.on('mousemove', function (e) {
    bandpassPostMessage({ type: 'cursor_moved', lat: e.latlng.lat, lon: e.latlng.lng });
  });

  bandpassPostMessage({ type: 'ready' });

}());
</script>
</body>
</html>
