# =============================================================================
# BANDPASS-II Scenario: Williams (2004) UK Datatrak Network
# =============================================================================
#
# Source: Williams, A.I. (2004), "Prediction of the Coverage and Performance
#         of the Datatrak Low-Frequency Tracking System", PhD Thesis,
#         University of Wales, Bangor.
#
# Coordinates:  OSGB National Grid E/N from Locator 'sg' almanac data
#               (MkII Locator units #251RX, #217RX, #3675RX), converted to WGS84
#               via EPSG:27700→EPSG:4326. Cross-checked against Datatrak Mapper
#               (https://github.com/philpem/datatrak-mapper/) — agreement <0.1m at all stations.
#
# Slot assignments:  Williams Table K.1 (Appendix K, p221), corrected for
#                    Greenock/Alnwick swap per Locator firmware evidence
#                    (units #251RX, #217RX, #3675RX all agree: Greenock=11,
#                    Alnwick=12; Williams has these reversed).
#
# Power (power_w):  Average of f1 and f2 radiated powers.
#   - Measured (Table 4.3, p39): Huntingdon 36/23W, Stratford 85/43W,
#     Southport 40/22W.
#   - Datatrak nominal (§4.6, p38): 40W f1, 20W f2 for all others.
#   - Confirmed by field strength verification (Table 4.4, p42) for
#     Lowestoft, Asserby, Cowbridge at nominal values.
#
# Antenna height:  50m for all UK stations (§3.4.1, p24).
#
# Station delays (station_delay_us):  Measured at 5 stations (Table 11.2,
#   p162), frequency-averaged. Average of 0.22 μs used for remaining
#   8 stations (§11.3.1.2, p161).
#
# SPO (spo_us):  Per-station SPO values not tabulated in thesis; set to 0.0.
#   Williams notes SPO values are "known" (§I.2, p213) but does not list them.
#
# Multi-slot stations:  Asserby (slots 6, 16) and Southport (slots 7, 13)
#   each transmit on two slots from one physical mast. They are represented
#   here as single [[transmitter_sites]] with two [[transmitter_sites.slots]]
#   entries. (Williams Appendix K, pp221-222)
#
# 13 transmitter sites for 13 physical stations; 15 slots total.
# =============================================================================
[scenario]
name        = "Williams (2004) UK Datatrak Network"
created     = "2004-01-01"
[grid]
lat_min       = 49.5
lat_max       = 59.0
lon_min       = -7.0
lon_max       = 2.5
resolution_km = 2.0
[frequencies]
f1_khz = 146.4375
f2_khz = 131.2500
[receiver]
mode                 = "advanced"
noise_floor_dbuvpm   = 14.0
vehicle_noise_dbuvpm = 27.0
max_range_km         = 350.0
min_stations         = 4
vp_ms                = 299892718
ellipsoid            = "airy1830"
# =============================================================================
# Transmitter sites
# =============================================================================

# --- Huntingdon (MASTER) ---
# OSGB: 513054E, 262453N
# Power: f1=36W, f2=23W measured (Table 4.3, p39); avg=29.5W
# Delay: not measured (master); using 0.0
[[transmitter_sites]]
name     = "Huntingdon"
lat      = 52.248652
lon      = -0.345416
power_w  = 29.5
height_m = 50.0

  [[transmitter_sites.slots]]
  slot             = 1
  is_master        = true
  master_slot      = 0
  spo_us           = 0.0
  station_delay_us = 0.0

# --- Selsey ---
# OSGB: 485278E, 96602N
# Power: Datatrak nominal f1=40W, f2=20W (§4.6, p38); avg=30.0W
# Delay: not measured; using average 0.22 μs (§11.3.1.2, p161)
[[transmitter_sites]]
name     = "Selsey"
lat      = 50.762753
lon      = -0.792227
power_w  = 30.0
height_m = 50.0

  [[transmitter_sites.slots]]
  slot             = 2
  is_master        = false
  master_slot      = 1
  spo_us           = 0.0
  station_delay_us = 0.22

# --- Kent ---
