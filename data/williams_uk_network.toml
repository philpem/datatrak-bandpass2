# --- Asserby (Skegness) ---
# OSGB: 548892E, 377459N
# Power: Datatrak nominal f1=40W, f2=20W (§4.6, p38); avg=30.0W
#   Confirmed at nominal in field strength verification (Table 4.4, p42;
#   listed as "Skegness")
# Delay: measured (Table 11.2, p162): f1+=0.05, f1-=0.03, f2+=0.08,
#   f2-=0.05 μs; avg=0.053 μs
# Multi-slot: slot 6 (standard, master: Stratford) and
#             slot 16 (interlaced, master: Cumbria).
# "two stations in the UK transmit on two slots (Asserby and Southport),
#  each with a different master" (Appendix K, p221)
[[transmitter_sites]]
name     = "Asserby"
lat      = 53.273217
lon      = 0.231368
power_w  = 30.0
height_m = 50.0

  [[transmitter_sites.slots]]
  slot             = 6
  is_master        = false
  master_slot      = 4
  spo_us           = 0.0
  station_delay_us = 0.053

  [[transmitter_sites.slots]]
  slot             = 16
  is_master        = false
  master_slot      = 10
  spo_us           = 0.0
  station_delay_us = 0.053

# --- Southport ---
# OSGB: 335235E, 414251N
# Power: f1=40W, f2=22W measured (Table 4.3, p39); avg=31.0W
# Delay: measured (Table 11.2, p162): f1+=0.23, f1-=0.22, f2+=0.18,
#   f2-=0.17 μs; avg=0.200 μs
# Multi-slot: slot 7 (standard, master: Huntingdon) and
#             slot 13 (interlaced, master: Cumbria).
# "The Southport transmitter transmits on slots 7 (master: Huntingdon
#  station) and 13 (master: Cumbria station)." (Appendix K, p222)
[[transmitter_sites]]
name     = "Southport"
lat      = 53.620775
lon      = -2.980613
power_w  = 31.0
height_m = 50.0

  [[transmitter_sites.slots]]
  slot             = 7
  is_master        = false
  master_slot      = 1
  spo_us           = 0.0
  station_delay_us = 0.200

  [[transmitter_sites.slots]]
  slot             = 13
  is_master        = false
  master_slot      = 10
  spo_us           = 0.0
  station_delay_us = 0.200

