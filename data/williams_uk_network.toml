# --- Stratford-upon-Avon (also "Kineton") ---
# OSGB: 433823E, 249974N
# Also referred to as "Kineton" in DTM-170 §7.4; radiates almanac information.
# Site is in farmland between Stratford-upon-Avon and Kineton villages.
# Power: f1=85W, f2=43W measured (Table 4.3, p39); avg=64.0W
#   "Stratford's radiated powers are more than 3 dB higher [than nominal].
#    According to Datatrak engineers, this may be due to the higher soil
#    conductivity at Stratford's raising the efficiency of the antenna-earth
#    system." (§4.6, p39)
# Delay: measured (Table 11.2, p162): f1+=0.12, f1-=0.11, f2+=0.17,
#   f2-=0.14 μs; avg=0.135 μs
[[transmitter_sites]]
name     = "Stratford-upon-Avon"
lat      = 52.147024
lon      = -1.507124
power_w  = 64.0
height_m = 50.0

  [[transmitter_sites.slots]]
  slot             = 4
  is_master        = false
  master_slot      = 1
  spo_us           = 0.0
  station_delay_us = 0.135

# --- Lowestoft ---
# OSGB: 641033E, 304123N
# Power: Datatrak nominal f1=40W, f2=20W (§4.6, p38); avg=30.0W
#   Confirmed at nominal in field strength verification (Table 4.4, p42)
# Delay: not measured; using average 0.22 μs
[[transmitter_sites]]
name     = "Lowestoft"
lat      = 52.581448
lon      = 1.556345
power_w  = 30.0
height_m = 50.0

  [[transmitter_sites.slots]]
  slot             = 5
