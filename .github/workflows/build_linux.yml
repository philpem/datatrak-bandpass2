name: Build (Linux)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.3.1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwxgtk3.2-dev libwxgtk-webview3.2-dev \
            libsqlite3-dev libcurl4-gnutls-dev \
            libgeographiclib-dev nlohmann-json3-dev \
            catch2 \
            cmake ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: |
          mkdir -p dist/bandpass2
          cp build/src/bandpass2 dist/bandpass2/
          cp -r build/src/web    dist/bandpass2/
          cd dist && zip -r ../bandpass2-linux-x86_64.zip bandpass2/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandpass2-linux-x86_64
          path: bandpass2-linux-x86_64.zip
          retention-days: 30
