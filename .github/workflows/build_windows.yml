name: Build (Windows)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC — keeps master cache warm
  workflow_dispatch:
    inputs:
      purge_cache:
        description: 'Skip cache restore and rebuild from scratch'
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-release
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/cmake/ci-triplets
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_binary_cache,readwrite"
      CACHE_VERSION: v1  # Bump to invalidate all caches repo-wide
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Create vcpkg binary cache directory
        run: New-Item -ItemType Directory -Force "${{ github.workspace }}/vcpkg_binary_cache"

      - name: Restore vcpkg binary cache
        if: ${{ github.event.inputs.purge_cache != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg_binary_cache
            build/vcpkg_installed
          key: vcpkg-win-release-${{ env.CACHE_VERSION }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-win-release-${{ env.CACHE_VERSION }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgJsonGlob: 'vcpkg.json'
          doNotCache: true

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure and build
        id: build
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::Configure failed — purging vcpkg cache and retrying from scratch"
            Remove-Item -Recurse -Force "${{ github.workspace }}/vcpkg_binary_cache/*" -ErrorAction SilentlyContinue
            Remove-Item -Recurse -Force "build" -ErrorAction SilentlyContinue
            cmake -B build -G Ninja `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
          cmake --build build --parallel
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg_binary_cache
            build/vcpkg_installed
          key: vcpkg-win-release-${{ env.CACHE_VERSION }}-${{ hashFiles('vcpkg.json') }}

      - name: Package
        run: |
          New-Item -ItemType Directory -Force dist\bandpass2
          Copy-Item build\src\bandpass2.exe dist\bandpass2\
          Copy-Item -Recurse build\src\web dist\bandpass2\web
          Compress-Archive -Path dist\bandpass2 -DestinationPath bandpass2-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: bandpass2-windows-x64
          path: bandpass2-windows-x64.zip
          retention-days: 30
