name: Build (Windows)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-release
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/cmake/ci-triplets
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_binary_cache,readwrite"
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Create vcpkg binary cache directory
        run: New-Item -ItemType Directory -Force "${{ github.workspace }}/vcpkg_binary_cache"

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg_binary_cache
            build/vcpkg_installed
          key: vcpkg-win-release-${{ hashFiles('vcpkg.json') }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgJsonGlob: 'vcpkg.json'
          doNotCache: true

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: |
          New-Item -ItemType Directory -Force dist\bandpass2
          Copy-Item build\src\bandpass2.exe dist\bandpass2\
          Copy-Item -Recurse build\src\web dist\bandpass2\web
          Compress-Archive -Path dist\bandpass2 -DestinationPath bandpass2-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: bandpass2-windows-x64
          path: bandpass2-windows-x64.zip
          retention-days: 30
