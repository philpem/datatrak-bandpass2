name: Build (Windows)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.3.1

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        run: |
          New-Item -ItemType Directory -Force dist\bandpass2
          Copy-Item build\src\Release\bandpass2.exe dist\bandpass2\
          Copy-Item -Recurse build\src\web dist\bandpass2\web
          Compress-Archive -Path dist\bandpass2 -DestinationPath bandpass2-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandpass2-windows-x64
          path: bandpass2-windows-x64.zip
          retention-days: 30
